<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hikari Nihongo Center</title>

<link rel="icon" href="images/logo1.ico">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<div class="container">

<div class="logo">

<h1>Hikari Nihongo Center</h1>

</div>

</div>

</header>



<section class="hero">

<h2>こんにちは！</h2>

<p>Platform pembelajaran bahasa Jepang</p>

</section>



<main class="container">

<div class="tabs">

<button class="tab active" data-tab="hiragana">Hiragana</button>
<button class="tab" data-tab="katakana">Katakana</button>
<button class="tab" data-tab="kanji">Kanji</button>

</div>



<!-- HIRAGANA -->

<section id="hiragana" class="tab-content active">

<div class="char-grid" id="hiragana-grid"></div>

</section>

<section id="katakana" class="tab-content">

<h2>Kanji Dasar</h2>

<div class="kanji-grid" id="kanji-grid"></div>

<!-- VOCAB -->

<div class="vocab-grid" id="vocab-grid"></div>
